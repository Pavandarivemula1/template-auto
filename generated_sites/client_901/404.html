<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harsha Builders</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* Shared CSS Variables */
        :root {
            --bg-color: #f7f3e8; 
            --surface-color: #FFFFFF;
            --text-primary: #1C1A18; 
            --text-secondary: #5A5856; 
            --accent-green: #6d7b5b; 
            --accent-green-hover: #5a664c;
            --border-color: #D5D1C8;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
            --container-width: 1280px;
            --transition-smooth: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Global Reset */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background-color: var(--bg-color); color: var(--text-primary);
            font-family: var(--font-sans); line-height: 1.6;
            -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
            display: flex; flex-direction: column; min-height: 100vh;
        }
        a { text-decoration: none; color: inherit; transition: var(--transition-smooth); }
        .container { max-width: var(--container-width); margin: 0 auto; padding: 0 5%; width: 100%; }

        /* --- Navigation --- */
        header {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            padding: 12px 0; background: rgba(247, 243, 232, 0.95);
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        nav { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
        nav a:hover { color: var(--accent-green); }
        .logo { font-family: var(--font-serif); font-size: 1.4rem; font-weight: 600; letter-spacing: 0.02em; text-transform: none; }

        /* --- 404 Specific Layout --- */
        main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 150px 0 100px;
        }

        .error-code {
            font-family: var(--font-serif);
            font-size: clamp(6rem, 15vw, 12rem);
            line-height: 1;
            color: var(--border-color);
            margin-bottom: 20px;
        }

        .error-content h1 {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 15px;
        }

        .error-content p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Buttons */
        .btn-group { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .btn {
            display: inline-block; background-color: var(--accent-green); color: white; border: 1px solid var(--accent-green);
            padding: 16px 32px; font-family: var(--font-sans); font-size: 0.8rem; font-weight: 500;
            text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: var(--transition-smooth);
        }
        .btn:hover { background-color: var(--accent-green-hover); border-color: var(--accent-green-hover); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        .btn-outline { background: transparent; color: var(--text-primary); border-color: var(--text-primary); }
        .btn-outline:hover { background: var(--text-primary); color: white; }

        /* --- Footer --- */
        footer { text-align: center; padding: 30px 0; font-size: 0.85rem; color: var(--text-secondary); border-top: 1px solid var(--border-color); }

        /* Responsive */
        @media (max-width: 768px) {
            header nav { font-size: 0.75rem; gap: 10px; }
            .logo { font-size: 1.2rem; }
            .error-content h1 { font-size: 2rem; }
        }
    </style>

    <!-- Generated by Template Engine -->
    <meta data-engine-client content="true" />

    <meta name="description" content="Premium family homes since 2010" />
</head>

        <div class="container">

                <a href="about.html">About Us</a>
            </nav>
        </div>

            <div class="btn-group">
                <a href="index.html" class="btn">Return Home</a>
                <a href="projects.html" class="btn btn-outline">View Portfolio</a>
            </div>
        </div>
    </main>

        <div class="container">

    </footer>
