<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | {{title}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-control {
            padding: 0.75rem 1rem;
            border: 1px solid rgba(43, 34, 29, 0.1);
            border-radius: var(--radius-sm);
            font-family: var(--font-family);
            font-size: 1rem;
            background-color: var(--color-surface);
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--color-accent);
        }

        textarea.form-control {
            min-height: 120px;
            resize: vertical;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="site-header" id="header">
        <div class="container header-inner">
            <a href="index.html" class="logo" aria-label="Compatto Home">
                <svg class="logo-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" fill="currentColor" />
                    <path d="M12 6c-3.3 0-6 2.7-6 6s2.7 6 6 6 6-2.7 6-6-2.7-6-6-6z" fill="#f9f7f4" />
                </svg>
                {{logo_text}}
            </a>

            <!-- Mobile Menu Toggle -->
            <button class="menu-toggle" id="menu-toggle" aria-label="Toggle navigation menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <!-- Navigation Menu -->
            <nav class="nav-menu" id="nav-menu">
                <ul class="nav-links">
                    <li><a href="about.html">Who we are</a></li>
                    <li><a href="process.html">Our process</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="why-choose.html">Why choose us</a></li>
                </ul>
                <div class="nav-cta">
                    <a href="index.html" class="btn" id="mobile-contact-btn">Go Home</a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <section class="section" style="padding-top: var(--space-xl);">
            <div class="container">
                <div class="section-header">
                    <h1 style="font-size: 2.5rem; margin-bottom: var(--space-sm);">Get in <span
                            style="color: var(--color-accent);">Touch</span></h1>
                    <p>Start your furnishing journey with us today.</p>
                </div>

                <div class="contact-grid">
                    <div class="contact-info" style="margin-bottom: var(--space-lg);">
                        <div style="margin-bottom: 1rem;">
                            <h4 style="margin-bottom: 0.2rem;">Email</h4>
                            <p><a href="mailto:{{email}}">hello@{{title}}.gr</a></p>
                        </div>
                        <div style="margin-bottom: 1rem;">
                            <h4 style="margin-bottom: 0.2rem;">Phone</h4>
                            <p><a href="tel:{{contact}}">{{contact}}</a></p>
                        </div>
                        <div>
                            <h4 style="margin-bottom: 0.2rem;">Office</h4>
                            <p>Athens, Greece<br>Available Mon-Fri, 9am - 6pm</p>
                        </div>
                    </div>

                    <form class="contact-form" action="#" method="POST" onsubmit="event.preventDefault();">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" class="form-control" placeholder="Jane Doe"
                                required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" class="form-control"
                                placeholder="jane@example.com" required>
                        </div>

                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" class="form-control"
                                placeholder="Tell us about your project..." required></textarea>
                        </div>

                        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Send Message</button>
                    </form>
                </div>

            </div>
        </section>
    </main>

    <footer class="site-footer" style="margin-top: var(--space-xl);">
        <div class="container">
            <div class="footer-top">
                <div class="footer-brand">
                    <div class="footer-logo">{{logo_text}}</div>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 {{title}}. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>
